<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#3b82f6" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- Glow circle behind flag -->
  <circle cx="256" cy="240" r="100" fill="#22c55e" opacity="0.06"/>
  <!-- Flag icon -->
  <g transform="translate(168, 100)" fill="none" stroke="url(#glow)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- Flagpole -->
    <line x1="24" y1="24" x2="24" y2="300"/>
    <!-- Flag body -->
    <path d="M24 24 L200 24 L200 120 Q140 160 80 120 L24 120" fill="#22c55e" fill-opacity="0.12" stroke="url(#glow)"/>
    <!-- Flag wave detail -->
    <path d="M24 120 Q80 160 140 120 Q170 105 200 120" stroke="url(#glow)" stroke-width="14" opacity="0.3"/>
  </g>
  <!-- Small accent dot -->
  <circle cx="400" cy="400" r="12" fill="#22c55e" opacity="0.4"/>
</svg>

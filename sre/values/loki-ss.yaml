loki:
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  ingester:
    chunk_encoding: snappy
  querier:
    max_concurrent: 4
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    # Increase from default 4MB/s to 15MB/s
    ingestion_rate_mb: 15
    # Increase the burst window capacity to allow spikes
    ingestion_burst_size_mb: 30
  storage:
    bucketNames:
      chunks: ${bucket_name_prefix}-loki-chunks
      ruler: ${bucket_name_prefix}-loki-ruler
    backend: s3
    s3:
      endpoint: s3.${aws_region}.amazonaws.com
      s3ForcePathStyle: true
      region: ${aws_region}
      access_key_id: ${aws_access_key}
      secret_access_key: ${aws_secret_key}
      insecure: false

deploymentMode: SimpleScalable

backend:
  replicas: 2
  sidecar: false
read:
  replicas: 2
write:
  replicas: 3 # To ensure data durability with replication

gateway:
  nginxConfig:
    enableIPv6: false

minio:
  enabled: false

controller:
  volumes:
    extra:
      - name: proc
        readOnly: true
        hostPath:
          path: /proc

      - name: sys
        hostPath:
          path: /sys

clustering:
  enabled: true

alloy:
  mounts:
    extra:
      - name: proc
        mountPath: /host/proc
        readOnly: true

      - name: sys
        mountPath: /host/sys
        readOnly: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi

  serviceAccount:
    create: true
    name: "${namespace}-alloy-sa"
  rbac:
    create: true

  configMap:
    # Build config from Terraform
    content: |
${alloy_config}
  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    fsGroup: 472

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 472
    fsGroup: 472

# Disable ServiceMonitor for monitoring Alloy itself
serviceMonitor:
  enabled: false


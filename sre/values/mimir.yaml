mimir:
  structuredConfig:
    # Use different buckets instead of different prefix for storage
    common:
      storage:
        backend: s3
        s3:
          bucket_name: ${bucket_name}
          endpoint: s3.amazonaws.com
          access_key_id: ${aws_access_key}
          secret_access_key: ${aws_secret_key}

    blocks_storage:
      s3:
        bucket_name: ${bucket_name}-block

    ruler_storage:
      s3:
        bucket_name: ${bucket_name}-ruler

    alertmanager_storage:
      s3:
        bucket_name: ${bucket_name}-alert

minio:
  enabled: false

gateway:
  nginx:
    config:
      enableIPv6: false

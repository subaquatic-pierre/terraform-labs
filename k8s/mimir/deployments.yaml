apiVersion: v1
kind: List
items:
  # --- GATEWAY ---
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: mimir-gateway
      namespace: mimir-test
      labels:
        app.kubernetes.io/name: mimir
        app.kubernetes.io/component: gateway
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: mimir
          app.kubernetes.io/component: gateway
      template:
        metadata:
          labels:
            app.kubernetes.io/name: mimir
            app.kubernetes.io/component: gateway
        spec:
          serviceAccountName: mimir
          terminationGracePeriodSeconds: 30
          securityContext:
            fsGroup: 10001
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: gateway
              image: docker.io/nginxinc/nginx-unprivileged:1.29-alpine
              imagePullPolicy: IfNotPresent
              ports:
                - containerPort: 8080
                  name: http-metrics
              readinessProbe:
                httpGet:
                  path: /ready
                  port: http-metrics
                initialDelaySeconds: 15
                periodSeconds: 10
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
                readOnlyRootFilesystem: true
              volumeMounts:
                - mountPath: /etc/nginx/nginx.conf
                  name: nginx-config
                  subPath: nginx.conf
                - mountPath: /tmp
                  name: tmp
                - mountPath: /docker-entrypoint.d
                  name: docker-entrypoint-d-override
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: mimir
                  app.kubernetes.io/component: gateway
          volumes:
            - name: nginx-config
              configMap:
                name: mimir-gateway-nginx
            - name: docker-entrypoint-d-override
              emptyDir: {}
            - name: tmp
              emptyDir: {}

  # --- DISTRIBUTOR ---
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: mimir-distributor
      namespace: mimir-test
      labels:
        app.kubernetes.io/name: mimir
        app.kubernetes.io/component: distributor
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: mimir
          app.kubernetes.io/component: distributor
      template:
        metadata:
          labels:
            app.kubernetes.io/name: mimir
            app.kubernetes.io/component: distributor
        spec:
          serviceAccountName: mimir
          terminationGracePeriodSeconds: 100
          securityContext:
            fsGroup: 10001
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: distributor
              image: docker.io/grafana/mimir:3.1.2
              imagePullPolicy: IfNotPresent
              args:
                - -target=distributor
                - -config.expand-env=true
                - -config.file=/etc/mimir/mimir.yaml
                - -server.grpc.keepalive.max-connection-age=60s
                - -server.grpc.keepalive.max-connection-age-grace=5m
                - -server.grpc.keepalive.max-connection-idle=1m
                - -shutdown-delay=90s
              env:
                - name: GOMAXPROCS
                  value: "8"
              ports:
                - containerPort: 8080
                  name: http-metrics
                - containerPort: 9095
                  name: grpc
                - containerPort: 7946
                  name: memberlist
              readinessProbe:
                httpGet:
                  path: /ready
                  port: http-metrics
                initialDelaySeconds: 45
                periodSeconds: 10
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
                readOnlyRootFilesystem: true
              volumeMounts:
                - mountPath: /etc/mimir
                  name: config
                - mountPath: /var/mimir
                  name: runtime-config
                - mountPath: /data
                  name: storage
                - mountPath: /active-query-tracker
                  name: active-queries
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: mimir
                  app.kubernetes.io/component: distributor
          volumes:
            - name: config
              configMap:
                name: mimir-config
                items:
                  - key: mimir.yaml
                    path: mimir.yaml
            - name: runtime-config
              configMap:
                name: mimir-runtime
            - name: storage
              emptyDir: {}
            - name: active-queries
              emptyDir: {}

  # --- RULER ---
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      labels:
        app.kubernetes.io/component: ruler
        app.kubernetes.io/name: mimir
      name: mimir-ruler
      namespace: mimir-test
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/component: ruler
          app.kubernetes.io/name: mimir
      strategy:
        rollingUpdate:
          maxSurge: 50%
          maxUnavailable: 0
        type: RollingUpdate
      template:
        metadata:
          labels:
            app.kubernetes.io/component: ruler
            app.kubernetes.io/name: mimir
          namespace: mimir-test
        spec:
          containers:
            - args:
                - -target=ruler
                - -config.expand-env=true
                - -config.file=/etc/mimir/mimir.yaml
                - -mem-ballast-size-bytes=1073741824
                - -distributor.remote-timeout=10s
              image: docker.io/grafana/mimir:3.1.2
              imagePullPolicy: IfNotPresent
              name: ruler
              ports:
                - containerPort: 8080
                  name: http-metrics
                  protocol: TCP
                - containerPort: 9095
                  name: grpc
                  protocol: TCP
                - containerPort: 7946
                  name: memberlist
                  protocol: TCP
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  path: /ready
                  port: http-metrics
                  scheme: HTTP
                initialDelaySeconds: 45
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 1
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              volumeMounts:
                - mountPath: /etc/mimir
                  name: config
                - mountPath: /var/mimir
                  name: runtime-config
                - mountPath: /data
                  name: storage
                - mountPath: /active-query-tracker
                  name: active-queries
          securityContext:
            fsGroup: 10001
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
          serviceAccount: mimir
          serviceAccountName: mimir
          volumes:
            - configMap:
                defaultMode: 420
                items:
                  - key: mimir.yaml
                    path: mimir.yaml
                name: mimir-config
              name: config
            - configMap:
                defaultMode: 420
                name: mimir-runtime
              name: runtime-config
            - emptyDir: {}
              name: storage
            - emptyDir: {}
              name: active-queries

  # --- ROLLOUT OPERATOR ---
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      labels:
        app.kubernetes.io/instance: mimir
        app.kubernetes.io/name: rollout-operator
      name: mimir-rollout-operator
      namespace: mimir-test
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/instance: mimir
          app.kubernetes.io/name: rollout-operator
      strategy:
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
        type: RollingUpdate
      template:
        metadata:
          labels:
            app.kubernetes.io/instance: mimir
            app.kubernetes.io/name: rollout-operator
          namespace: mimir-test
        spec:
          containers:
            - args:
                - -kubernetes.namespace=mimir-test
                - -zpdb.pod-ready-annotation-patch-timeout=5s
                - -server-tls.enabled=true
                - -server-tls.self-signed-cert.secret-name=certificate
                - -server-tls.self-signed-cert.dns-name=mimir-rollout-operator.mimir-test.svc
              image: docker.io/grafana/rollout-operator:v0.38.0
              imagePullPolicy: IfNotPresent
              name: rollout-operator
              ports:
                - containerPort: 8001
                  name: http-metrics
                  protocol: TCP
                - containerPort: 8443
                  name: https
                  protocol: TCP
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  path: /ready
                  port: http-metrics
                  scheme: HTTP
                initialDelaySeconds: 5
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 1
              resources:
                limits:
                  memory: 200Mi
                requests:
                  cpu: 100m
                  memory: 100Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
          securityContext:
            fsGroup: 10001
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
          serviceAccount: mimir-rollout-operator
          serviceAccountName: mimir-rollout-operator

  # --- QUERY SCHEDULER ---
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      labels:
        app.kubernetes.io/component: query-scheduler
        app.kubernetes.io/instance: mimir
      name: mimir-query-scheduler
      namespace: mimir-test
    spec:
      replicas: 2
      selector:
        matchLabels:
          app.kubernetes.io/component: query-scheduler
          app.kubernetes.io/instance: mimir
      strategy:
        rollingUpdate:
          maxSurge: 1
          maxUnavailable: 0
        type: RollingUpdate
      template:
        metadata:
          labels:
            app.kubernetes.io/component: query-scheduler
            app.kubernetes.io/instance: mimir
        spec:
          containers:
            - args:
                - -target=query-scheduler
                - -config.expand-env=true
                - -config.file=/etc/mimir/mimir.yaml
              image: docker.io/grafana/mimir:3.1.2
              imagePullPolicy: IfNotPresent
              name: query-scheduler
              ports:
                - containerPort: 8080
                  name: http-metrics
                  protocol: TCP
                - containerPort: 9095
                  name: grpc
                  protocol: TCP
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  path: /ready
                  port: http-metrics
                  scheme: HTTP
                initialDelaySeconds: 45
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 1
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              volumeMounts:
                - mountPath: /var/mimir
                  name: runtime-config
                - mountPath: /etc/mimir
                  name: config
                - mountPath: /data
                  name: storage
                - mountPath: /active-query-tracker
                  name: active-queries
          securityContext:
            fsGroup: 10001
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
          serviceAccount: mimir
          serviceAccountName: mimir
          terminationGracePeriodSeconds: 180
          topologySpreadConstraints:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/component: query-scheduler
                  app.kubernetes.io/instance: mimir
                  app.kubernetes.io/name: mimir
              maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: ScheduleAnyway
          volumes:
            - configMap:
                defaultMode: 420
                items:
                  - key: mimir.yaml
                    path: mimir.yaml
                name: mimir-config
              name: config
            - configMap:
                defaultMode: 420
                name: mimir-runtime
              name: runtime-config
            - emptyDir: {}
              name: storage
            - emptyDir: {}
              name: active-queries

